<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grupo de Ofertas 🔥</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:    #25D366;
      --green-dk: #128C7E;
      --green-lt: #dcfce7;
      --bg:       #0a0f0d;
      --surface:  #111a15;
      --border:   rgba(37,211,102,.18);
      --text:     #e8f5eb;
      --muted:    #7dab8a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── animated background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 20% 10%, rgba(37,211,102,.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 90%, rgba(18,140,126,.14) 0%, transparent 60%);
      z-index: 0;
      animation: breathe 8s ease-in-out infinite alternate;
    }
    @keyframes breathe {
      from { opacity: .6; }
      to   { opacity: 1; }
    }

    /* grain texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: .6;
    }

    /* ── layout ── */
    .stage {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 3rem 2.5rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(37,211,102,.06),
        0 40px 80px rgba(0,0,0,.55),
        0 0 60px rgba(37,211,102,.06);
      animation: cardIn .7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(32px) scale(.97); }
      to   { opacity:1; transform: translateY(0)   scale(1);    }
    }

    /* ── icon ── */
    .icon-wrap {
      width: 80px; height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green) 0%, var(--green-dk) 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 12px rgba(37,211,102,.1), 0 8px 32px rgba(37,211,102,.35);
      animation: pulse 2.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 12px rgba(37,211,102,.10), 0 8px 32px rgba(37,211,102,.35); }
      50%      { box-shadow: 0 0 0 20px rgba(37,211,102,.04), 0 8px 40px rgba(37,211,102,.50); }
    }
    .icon-wrap svg { width: 42px; height: 42px; fill: #fff; }

    /* ── badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: rgba(37,211,102,.12);
      border: 1px solid rgba(37,211,102,.25);
      color: var(--green);
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: .3rem .85rem;
      border-radius: 999px;
      margin-bottom: 1.1rem;
      animation: fadeUp .6s .15s both;
    }
    .badge::before { content: '●'; font-size: .55rem; animation: blink 1.4s step-start infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── heading ── */
    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.7rem, 5vw, 2.2rem);
      line-height: 1.15;
      margin-bottom: .75rem;
      background: linear-gradient(135deg, #fff 30%, var(--green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp .6s .25s both;
    }

    p {
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.65;
      margin-bottom: 2rem;
      animation: fadeUp .6s .35s both;
    }
    p strong { color: var(--text); font-weight: 500; }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0);    }
    }

    /* ── CTA button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .65rem;
      background: linear-gradient(135deg, var(--green) 0%, var(--green-dk) 100%);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: .02em;
      padding: 1rem 2rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      width: 100%;
      transition: transform .18s, box-shadow .18s, filter .18s;
      box-shadow: 0 6px 28px rgba(37,211,102,.40);
      animation: fadeUp .6s .45s both;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.18) 0%, transparent 60%);
      border-radius: inherit;
    }
    .btn:hover  { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(37,211,102,.55); filter: brightness(1.07); }
    .btn:active { transform: translateY(0px);  box-shadow: 0 4px 16px rgba(37,211,102,.35); }
    .btn svg    { width: 22px; height: 22px; fill: #fff; flex-shrink: 0; }

    /* ── divider / footer ── */
    .divider {
      margin: 1.75rem 0 1.25rem;
      border: none;
      border-top: 1px solid var(--border);
      animation: fadeUp .6s .55s both;
    }

    .perks {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      animation: fadeUp .6s .6s both;
    }
    .perk {
      display: flex;
      align-items: center;
      gap: .35rem;
      font-size: .78rem;
      color: var(--muted);
    }
    .perk span { font-size: 1rem; }

    /* floating particles */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .p {
      position: absolute;
      border-radius: 50%;
      background: var(--green);
      opacity: 0;
      animation: floatUp var(--d) var(--delay) ease-in infinite;
    }
    @keyframes floatUp {
      0%   { opacity:0;    transform: translateY(0)   scale(1);   }
      15%  { opacity:.35; }
      85%  { opacity:.1; }
      100% { opacity:0;    transform: translateY(-90vh) scale(.4); }
    }
  </style>
</head>
<body>

  <!-- particles -->
  <div class="particles" id="pts"></div>

  <div class="stage">
    <div class="card">
      <!-- WhatsApp icon -->
      <div class="icon-wrap">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 .5C7.44.5.5 7.44.5 16c0 2.72.69 5.37 2 7.72L.5 31.5l8.04-2c2.26 1.2 4.81 1.84 7.46 1.84C24.56 31.34 31.5 24.4 31.5 16S24.56.5 16 .5zm0 28.34c-2.4 0-4.74-.64-6.78-1.85l-.48-.28-5.02 1.32 1.34-4.9-.31-.5A11.83 11.83 0 0 1 4.16 16C4.16 9.44 9.44 4.16 16 4.16S27.84 9.44 27.84 16 22.56 28.84 16 28.84zm6.52-8.88c-.36-.18-2.12-1.04-2.45-1.16-.33-.12-.57-.18-.8.18-.24.36-.92 1.16-1.13 1.4-.21.24-.42.27-.78.09-.36-.18-1.52-.56-2.9-1.79-1.07-.95-1.8-2.13-2.01-2.49-.21-.36-.02-.55.16-.73.16-.16.36-.42.54-.63.18-.21.24-.36.36-.6.12-.24.06-.45-.03-.63-.09-.18-.8-1.94-1.1-2.65-.29-.7-.59-.6-.8-.61h-.68c-.24 0-.63.09-.96.45-.33.36-1.26 1.23-1.26 3s1.29 3.48 1.47 3.72c.18.24 2.54 3.88 6.15 5.44.86.37 1.53.59 2.05.75.86.27 1.65.23 2.27.14.69-.1 2.12-.87 2.42-1.71.3-.84.3-1.56.21-1.71-.09-.15-.33-.24-.69-.42z"/>
        </svg>
      </div>

      <div class="badge">Grupo exclusivo</div>

      <h1>Ofertas Imperdíveis no WhatsApp 🔥</h1>
      <p>
        Receba <strong>promoções exclusivas, cupons e descontos</strong> direto no seu celular — antes de todo mundo. Grátis e sem spam.
      </p>

      <!-- ⬇️  Substitua o href pelo link real do seu grupo -->
      <a class="btn" href="{{group_link}}" target="_blank" rel="noopener">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 .5C7.44.5.5 7.44.5 16c0 2.72.69 5.37 2 7.72L.5 31.5l8.04-2c2.26 1.2 4.81 1.84 7.46 1.84C24.56 31.34 31.5 24.4 31.5 16S24.56.5 16 .5zm0 28.34c-2.4 0-4.74-.64-6.78-1.85l-.48-.28-5.02 1.32 1.34-4.9-.31-.5A11.83 11.83 0 0 1 4.16 16C4.16 9.44 9.44 4.16 16 4.16S27.84 9.44 27.84 16 22.56 28.84 16 28.84zm6.52-8.88c-.36-.18-2.12-1.04-2.45-1.16-.33-.12-.57-.18-.8.18-.24.36-.92 1.16-1.13 1.4-.21.24-.42.27-.78.09-.36-.18-1.52-.56-2.9-1.79-1.07-.95-1.8-2.13-2.01-2.49-.21-.36-.02-.55.16-.73.16-.16.36-.42.54-.63.18-.21.24-.36.36-.6.12-.24.06-.45-.03-.63-.09-.18-.8-1.94-1.1-2.65-.29-.7-.59-.6-.8-.61h-.68c-.24 0-.63.09-.96.45-.33.36-1.26 1.23-1.26 3s1.29 3.48 1.47 3.72c.18.24 2.54 3.88 6.15 5.44.86.37 1.53.59 2.05.75.86.27 1.65.23 2.27.14.69-.1 2.12-.87 2.42-1.71.3-.84.3-1.56.21-1.71-.09-.15-.33-.24-.69-.42z"/>
        </svg>
        Entrar no Grupo de Ofertas
      </a>

      <hr class="divider"/>

      <div class="perks">
        <div class="perk"><span>💰</span> 100% gratuito</div>
        <div class="perk"><span>🔕</span> Sem spam</div>
        <div class="perk"><span>⚡</span> Ofertas em primeira mão</div>
      </div>
    </div>
  </div>

  <script>
    // spawn floating particles
    const container = document.getElementById('pts');
    for (let i = 0; i < 22; i++) {
      const el = document.createElement('div');
      el.className = 'p';
      const size = Math.random() * 5 + 2;
      el.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        bottom:${-size}px;
        --d:${6 + Math.random()*10}s;
        --delay:${Math.random()*10}s;
        opacity:0;
      `;
      container.appendChild(el);
    }
  </script>
</body>
</html>
